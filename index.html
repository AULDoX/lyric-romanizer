<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lyric Romanizer - Suno向け日本語歌詞ローマ字変換</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #111;
      color: #e8e0c8;
      font-family: "Courier New", "Yu Gothic", monospace;
      padding: 24px 16px 48px;
    }
    .wrap { max-width: 1180px; margin: 0 auto; }
    h1 { margin: 0 0 6px; color: #f5c842; letter-spacing: .08em; font-size: 28px; }
    .subtitle, .hint { color: #9c8d63; line-height: 1.7; }
    .status {
      margin: 18px 0;
      padding: 12px 14px;
      border: 1px solid #3a3218;
      border-radius: 8px;
      background: #17150d;
      color: #d8c985;
      min-height: 44px;
    }
    .status.ok { border-color: #3f7a4f; color: #8be39a; }
    .status.error { border-color: #7a3333; color: #ff8d8d; }
    .status.loading { border-color: #8a6a18; color: #f5c842; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 780px) { .grid { grid-template-columns: 1fr; } }
    label { display: block; color: #f5c842; margin: 18px 0 8px; font-weight: 700; }
    textarea, pre {
      width: 100%;
      min-height: 360px;
      background: #080806;
      color: #fff4bd;
      border: 1px solid #2f2915;
      border-radius: 8px;
      padding: 16px;
      font: 18px/1.8 "Courier New", monospace;
      white-space: pre-wrap;
      overflow: auto;
    }
    textarea { resize: vertical; }
    pre { margin: 0; }
    .diff { min-height: 180px; font-size: 15px; color: #cfc28d; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin: 14px 0; }
    button {
      border: 1px solid #6d5216;
      background: #131008;
      color: #f5c842;
      border-radius: 8px;
      padding: 11px 16px;
      font-weight: 700;
      cursor: pointer;
      font-size: 15px;
    }
    button:hover { background: #211a09; }
    button:disabled { opacity: .45; cursor: not-allowed; }
    .primary { background: #f5c842; color: #111; border-color: #f5c842; }
    .danger { color: #ff8d8d; border-color: #693131; }
    .panel { margin-top: 20px; padding: 16px; border: 1px solid #2f2915; border-radius: 8px; background: #0d0d09; }
    .small { font-size: 13px; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Lyric Romanizer</h1>
    <p class="subtitle">Suno向け日本語歌詞ローマ字変換。通常は軽量変換、漢字の読みまで必要な時だけkuromoji精密変換を使います。</p>

    <div id="status" class="status">準備完了。左に歌詞を入力してください。</div>

    <div class="row">
      <button class="primary" id="lightBtn">軽量かなローマ字変換</button>
      <button id="kuromojiBtn">kuromoji精密変換</button>
      <button id="copyBtn" disabled>変換後をコピー</button>
      <button id="clearBtn" class="danger">クリア</button>
    </div>

    <div class="grid">
      <section>
        <label for="inputArea">変換前 / 元の歌詞</label>
        <textarea id="inputArea" placeholder="例：
[Verse]
私は海へ行こう
始発で出かける
歩幅を合わせる"></textarea>
      </section>
      <section>
        <label for="outputArea">変換後 / Sunoへ渡すローマ字</label>
        <pre id="outputArea">ここに変換後が表示されます。</pre>
      </section>
    </div>

    <section class="panel">
      <label for="diffArea">変更された行</label>
      <pre id="diffArea" class="diff">変換後に表示されます。</pre>
      <p class="hint small">
        [Verse] や [Chorus] などのセクションタグはそのまま残します。<br>
        kuromoji精密変換は初回に辞書を読み込むため時間がかかります。15秒で応答がない場合はエラー表示します。
      </p>
    </section>
  </main>

  <script>
    const statusEl = document.getElementById("status");
    const inputArea = document.getElementById("inputArea");
    const outputArea = document.getElementById("outputArea");
    const diffArea = document.getElementById("diffArea");
    const lightBtn = document.getElementById("lightBtn");
    const kuromojiBtn = document.getElementById("kuromojiBtn");
    const copyBtn = document.getElementById("copyBtn");
    const clearBtn = document.getElementById("clearBtn");

    function setStatus(message, type = "") {
      statusEl.textContent = message;
      statusEl.className = "status" + (type ? " " + type : "");
    }

    function isControlLine(line) {
      return /^\s*\[[^\]]+\]\s*$/.test(line) || /^\s*\([^\)]+\)\s*$/.test(line);
    }

    const combo = {
      きゃ:"kya",きゅ:"kyu",きょ:"kyo",しゃ:"sha",しゅ:"shu",しょ:"sho",ちゃ:"cha",ちゅ:"chu",ちょ:"cho",
      にゃ:"nya",にゅ:"nyu",にょ:"nyo",ひゃ:"hya",ひゅ:"hyu",ひょ:"hyo",みゃ:"mya",みゅ:"myu",みょ:"myo",
      りゃ:"rya",りゅ:"ryu",りょ:"ryo",ぎゃ:"gya",ぎゅ:"gyu",ぎょ:"gyo",じゃ:"ja",じゅ:"ju",じょ:"jo",
      びゃ:"bya",びゅ:"byu",びょ:"byo",ぴゃ:"pya",ぴゅ:"pyu",ぴょ:"pyo",
      キャ:"kya",キュ:"kyu",キョ:"kyo",シャ:"sha",シュ:"shu",ショ:"sho",チャ:"cha",チュ:"chu",チョ:"cho",
      ニャ:"nya",ニュ:"nyu",ニョ:"nyo",ヒャ:"hya",ヒュ:"hyu",ヒョ:"hyo",ミャ:"mya",ミュ:"myu",ミョ:"myo",
      リャ:"rya",リュ:"ryu",リョ:"ryo",ギャ:"gya",ギュ:"gyu",ギョ:"gyo",ジャ:"ja",ジュ:"ju",ジョ:"jo",
      ビャ:"bya",ビュ:"byu",ビョ:"byo",ピャ:"pya",ピュ:"pyu",ピョ:"pyo",ファ:"fa",フィ:"fi",フェ:"fe",フォ:"fo"
    };
    const single = {
      あ:"a",い:"i",う:"u",え:"e",お:"o",か:"ka",き:"ki",く:"ku",け:"ke",こ:"ko",さ:"sa",し:"shi",す:"su",せ:"se",そ:"so",
      た:"ta",ち:"chi",つ:"tsu",て:"te",と:"to",な:"na",に:"ni",ぬ:"nu",ね:"ne",の:"no",は:"ha",ひ:"hi",ふ:"fu",へ:"he",ほ:"ho",
      ま:"ma",み:"mi",む:"mu",め:"me",も:"mo",や:"ya",ゆ:"yu",よ:"yo",ら:"ra",り:"ri",る:"ru",れ:"re",ろ:"ro",わ:"wa",を:"wo",ん:"n",
      が:"ga",ぎ:"gi",ぐ:"gu",げ:"ge",ご:"go",ざ:"za",じ:"ji",ず:"zu",ぜ:"ze",ぞ:"zo",だ:"da",ぢ:"ji",づ:"zu",で:"de",ど:"do",
      ば:"ba",び:"bi",ぶ:"bu",べ:"be",ぼ:"bo",ぱ:"pa",ぴ:"pi",ぷ:"pu",ぺ:"pe",ぽ:"po",
      ア:"a",イ:"i",ウ:"u",エ:"e",オ:"o",カ:"ka",キ:"ki",ク:"ku",ケ:"ke",コ:"ko",サ:"sa",シ:"shi",ス:"su",セ:"se",ソ:"so",
      タ:"ta",チ:"chi",ツ:"tsu",テ:"te",ト:"to",ナ:"na",ニ:"ni",ヌ:"nu",ネ:"ne",ノ:"no",ハ:"ha",ヒ:"hi",フ:"fu",ヘ:"he",ホ:"ho",
      マ:"ma",ミ:"mi",ム:"mu",メ:"me",モ:"mo",ヤ:"ya",ユ:"yu",ヨ:"yo",ラ:"ra",リ:"ri",ル:"ru",レ:"re",ロ:"ro",ワ:"wa",ヲ:"wo",ン:"n",
      ガ:"ga",ギ:"gi",グ:"gu",ゲ:"ge",ゴ:"go",ザ:"za",ジ:"ji",ズ:"zu",ゼ:"ze",ゾ:"zo",ダ:"da",ヂ:"ji",ヅ:"zu",デ:"de",ド:"do",
      バ:"ba",ビ:"bi",ブ:"bu",ベ:"be",ボ:"bo",パ:"pa",ピ:"pi",プ:"pu",ペ:"pe",ポ:"po",ぁ:"a",ぃ:"i",ぅ:"u",ぇ:"e",ぉ:"o",ゃ:"ya",ゅ:"yu",ょ:"yo",っ:"",ー:"-"
    };

    function kanaToRomaji(value) {
      const s = String(value || "");
      let out = "";
      for (let i = 0; i < s.length; i++) {
        if ((s[i] === "っ" || s[i] === "ッ") && i + 1 < s.length) {
          const next = combo[s.slice(i + 1, i + 3)] || single[s[i + 1]] || "";
          if (next) { out += next[0]; continue; }
        }
        const two = s.slice(i, i + 2);
        if (combo[two]) { out += combo[two]; i++; continue; }
        out += single[s[i]] !== undefined ? single[s[i]] : s[i];
      }
      return out;
    }

    function normalizeParticles(line) {
      return String(line || "")
        .replace(/は(?=\s*$|[、。,.!?！？])/g, "わ")
        .replace(/へ(?=\s*$|[、。,.!?！？])/g, "え");
    }

    function lightweightConvert(text) {
      return String(text || "").split(/\r?\n/).map(line => {
        if (isControlLine(line) || !line.trim()) return line;
        return kanaToRomaji(normalizeParticles(line));
      }).join("\n");
    }

    function diffText(beforeText, afterText) {
      const before = String(beforeText || "").split(/\r?\n/);
      const after = String(afterText || "").split(/\r?\n/);
      const rows = [];
      const max = Math.max(before.length, after.length);
      for (let i = 0; i < max; i++) {
        if ((before[i] || "") !== (after[i] || "")) rows.push("Line " + (i + 1) + ": " + (before[i] || "") + "  ->  " + (after[i] || ""));
      }
      return rows.length ? rows.join("\n") : "変更された行はありません。";
    }

    function showResult(result, message) {
      outputArea.textContent = result || "変換結果が空です。";
      diffArea.textContent = diffText(inputArea.value, result);
      copyBtn.disabled = !result;
      setStatus(message, "ok");
    }

    function runLightweight() {
      if (!inputArea.value.trim()) { setStatus("変換前の歌詞を入力してください。", "error"); return; }
      showResult(lightweightConvert(inputArea.value), "軽量変換が完了しました。漢字は読みを推定できないため、そのまま残ります。");
    }

    function runKuromoji() {
      if (!inputArea.value.trim()) { setStatus("変換前の歌詞を入力してください。", "error"); return; }
      setStatus("kuromoji辞書を読み込み中...15秒でタイムアウトします。", "loading");
      kuromojiBtn.disabled = true;
      lightBtn.disabled = true;
      let worker;
      let done = false;
      const timer = setTimeout(() => {
        if (done) return;
        done = true;
        if (worker) worker.terminate();
        kuromojiBtn.disabled = false;
        lightBtn.disabled = false;
        setStatus("kuromojiが15秒以内に応答しませんでした。CDN、Worker、ネットワークを確認してください。", "error");
      }, 15000);
      try {
        worker = new Worker("worker.js");
      } catch (error) {
        clearTimeout(timer);
        kuromojiBtn.disabled = false;
        lightBtn.disabled = false;
        setStatus("Workerを起動できません: " + error.message, "error");
        return;
      }
      worker.onmessage = event => {
        const data = event.data || {};
        if (data.type === "ready") {
          worker.postMessage({ type: "convert", text: inputArea.value });
        } else if (data.type === "result") {
          if (done) return;
          done = true;
          clearTimeout(timer);
          worker.terminate();
          kuromojiBtn.disabled = false;
          lightBtn.disabled = false;
          showResult(data.result, "kuromoji精密変換が完了しました。");
        } else if (data.type === "error") {
          if (done) return;
          done = true;
          clearTimeout(timer);
          worker.terminate();
          kuromojiBtn.disabled = false;
          lightBtn.disabled = false;
          setStatus("kuromojiエラー: " + data.message, "error");
        }
      };
      worker.onerror = error => {
        if (done) return;
        done = true;
        clearTimeout(timer);
        worker.terminate();
        kuromojiBtn.disabled = false;
        lightBtn.disabled = false;
        setStatus("Workerエラー: " + (error.message || "詳細不明"), "error");
      };
    }

    lightBtn.addEventListener("click", runLightweight);
    kuromojiBtn.addEventListener("click", runKuromoji);
    copyBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(outputArea.textContent || "");
        setStatus("変換後をコピーしました。", "ok");
      } catch (error) {
        setStatus("コピーに失敗しました: " + error.message, "error");
      }
    });
    clearBtn.addEventListener("click", () => {
      inputArea.value = "";
      outputArea.textContent = "ここに変換後が表示されます。";
      diffArea.textContent = "変換後に表示されます。";
      copyBtn.disabled = true;
      setStatus("クリアしました。", "");
    });
  </script>
</body>
</html>
